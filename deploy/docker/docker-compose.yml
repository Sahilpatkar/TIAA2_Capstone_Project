services:
  postgres:
    image: postgres:16-alpine
    container_name: lazyprices-postgres
    environment:
      POSTGRES_DB: lazyprices
      POSTGRES_USER: lazyprices
      POSTGRES_PASSWORD: lazyprices
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lazyprices"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
    container_name: lazyprices-backend
    ports:
      - "5001:5001"
    volumes:
      - lazyprices-data:/app/data
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://lazyprices:lazyprices@postgres:5432/lazyprices
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: lazyprices-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  pipeline:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
    volumes:
      - lazyprices-data:/app/data
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://lazyprices:lazyprices@postgres:5432/lazyprices
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    entrypoint: ["python", "run_pipeline.py"]
    profiles:
      - pipeline

volumes:
  lazyprices-data:
  postgres-data:
